name: Publish package

on:
  push:
    tags:
      - "*-v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: registry
    steps:
      - uses: actions/checkout@v4
      - name: Resolve package from tag
        id: pkg
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          NAME="${TAG%-v*}"
          VERSION="v${TAG##*-v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('packages/$NAME/manifest.json'))['version'])")
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "tag $TAG says $VERSION but manifest declares $MANIFEST_VERSION" >&2
            exit 1
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Publish to the registry
        run: ./scripts/publish-workflow-package.sh consultologistpublic "packages/${{ steps.pkg.outputs.name }}"
      - name: Smoke-check the published artifacts (anonymous)
        run: |
          set -euo pipefail
          BASE="https://consultologistpublic.blob.core.windows.net/workflow-packages"
          NAME="${{ steps.pkg.outputs.name }}"
          VERSION="${{ steps.pkg.outputs.version }}"
          LATEST=$(curl -sf "$BASE/$NAME/latest.json" | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")
          [ "$LATEST" = "$VERSION" ] || { echo "latest.json says $LATEST, expected $VERSION" >&2; exit 1; }
          curl -sf "$BASE/$NAME/$VERSION/manifest.json" | python3 -c "import json,sys; m=json.load(sys.stdin); print('served:', m['name'], m['version'], 'specVersion', m['specVersion'])"
